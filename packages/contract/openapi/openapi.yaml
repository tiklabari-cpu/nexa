openapi: 3.1.0

info:
  title: Nexa Platform API
  version: 1.0.0
  description: |
    Nexa live support + AI customer service platform.

    **Resource-based REST** (ADR-04). Actions that are not plain CRUD live as a
    POST sub-path under the resource they act on — `POST /chats/{chatId}/transfer`,
    not `POST /action/transfer_chat`.

    **Errors** always use the envelope `{ error: { type, message, request_id } }`.
    The `type` field is the machine-readable category; the HTTP status is derived
    from it and the two never disagree.

    **Auth** is OAuth 2.1 (authorization code + PKCE) for agents, Personal Access
    Tokens for server-to-server, and a short-lived customer token for the widget.
    Every route additionally declares the scopes it requires.

servers:
  - url: http://localhost:4000/api/v1
    description: Local development
  - url: https://api.nexa.example/api/v1
    description: Production (single region — eu)

tags:
  - name: System
    description: Health and metadata.
  - name: Auth
    description: OAuth 2.1, personal access tokens, customer tokens.
  - name: Chats
    description: Conversations — chat → thread → event.
  - name: Customer
    description: The widget-facing surface. Customer token only.
  - name: Customers
    description: CRM — people who have contacted the workspace.
  - name: Tickets
    description: Asynchronous follow-up work — the other half of "total cases".
  - name: Configuration
    description: Groups, agents, tags, canned responses, routing, channels.
  - name: Playbook
    description: AI agents, skills and the knowledge they answer from.
  - name: Settings
    description: Workspace configuration — trusted domains, saved replies, routing.
  - name: Reports
    description: Aggregate analytics.
  - name: Billing
    description: Subscription, usage metering, trial.

paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness and dependency check
      description: |
        Reports the process plus each backing store. Returns 200 only when every
        dependency is reachable, so it is safe to use as a readiness probe.
      security: []
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
        "503":
          description: At least one dependency is unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /auth/login:
    $ref: "./paths/auth.yaml#/login"
  /auth/authorize:
    $ref: "./paths/auth.yaml#/authorize"
  /auth/token:
    $ref: "./paths/auth.yaml#/token"
  /auth/revoke:
    $ref: "./paths/auth.yaml#/revoke"
  /auth/me:
    $ref: "./paths/auth.yaml#/me"
  /auth/signup:
    $ref: "./paths/account-lifecycle.yaml#/signup"
  /auth/password-reset:
    $ref: "./paths/account-lifecycle.yaml#/passwordReset"
  /auth/password-reset/confirm:
    $ref: "./paths/account-lifecycle.yaml#/passwordResetConfirm"
  /auth/invitations/preview:
    $ref: "./paths/account-lifecycle.yaml#/invitationPreview"
  /auth/invitations/accept:
    $ref: "./paths/account-lifecycle.yaml#/invitationAccept"
  /invitations:
    $ref: "./paths/account-lifecycle.yaml#/invitations"
  /invitations/{invitationId}:
    $ref: "./paths/account-lifecycle.yaml#/invitation"
  /auth/personal-access-tokens:
    $ref: "./paths/auth.yaml#/personalAccessTokens"
  /auth/personal-access-tokens/{tokenId}:
    $ref: "./paths/auth.yaml#/personalAccessToken"
  /customer/token:
    $ref: "./paths/auth.yaml#/customerToken"

  /chats:
    $ref: "./paths/chats.yaml#/chats"
  /chats/{chatId}:
    $ref: "./paths/chats.yaml#/chat"
  /chats/{chatId}/events:
    $ref: "./paths/chats.yaml#/events"
  /chats/{chatId}/deactivate:
    $ref: "./paths/chats.yaml#/deactivate"
  /chats/{chatId}/resume:
    $ref: "./paths/chats.yaml#/resume"
  /chats/{chatId}/transfer:
    $ref: "./paths/chats.yaml#/transfer"
  /chats/{chatId}/tags:
    $ref: "./paths/chats.yaml#/tags"
  /chats/{chatId}/tags/{tagName}:
    $ref: "./paths/chats.yaml#/tag"
  /chats/{chatId}/seen:
    $ref: "./paths/chats.yaml#/seen"

  /customer/chat:
    $ref: "./paths/customer-chat.yaml#/state"
  /customer/chat/events:
    $ref: "./paths/customer-chat.yaml#/events"
  /customer/chat/close:
    $ref: "./paths/customer-chat.yaml#/close"
  /customer/chat/rating:
    $ref: "./paths/customer-chat.yaml#/rating"

  /customers:
    $ref: "./paths/customers.yaml#/customers"
  /customers/{customerId}:
    $ref: "./paths/customers.yaml#/customer"
  /tickets:
    $ref: "./paths/tickets.yaml#/tickets"
  /tickets/{ticketId}:
    $ref: "./paths/tickets.yaml#/ticket"
  /customers/{customerId}/ban:
    $ref: "./paths/customers.yaml#/ban"

  /agents:
    $ref: "./paths/agents.yaml#/agents"
  /agents/me/routing-status:
    $ref: "./paths/agents.yaml#/routingStatus"
  /groups:
    $ref: "./paths/agents.yaml#/groups"

  /ai-agents:
    $ref: "./paths/playbook.yaml#/aiAgents"
  /ai-agents/{aiAgentId}:
    $ref: "./paths/playbook.yaml#/aiAgent"
  /skills:
    $ref: "./paths/playbook.yaml#/skills"
  /skills/compile:
    $ref: "./paths/playbook.yaml#/compile"
  /skills/preview:
    $ref: "./paths/playbook.yaml#/preview"
  /skills/{skillId}:
    $ref: "./paths/playbook.yaml#/skill"
  /skills/{skillId}/runs:
    $ref: "./paths/playbook.yaml#/runs"
  /knowledge-sources:
    $ref: "./paths/playbook.yaml#/knowledgeSources"
  /knowledge-sources/{sourceId}:
    $ref: "./paths/playbook.yaml#/knowledgeSource"

  /settings/trusted-domains:
    $ref: "./paths/settings.yaml#/trustedDomains"
  /settings/trusted-domains/{domainId}:
    $ref: "./paths/settings.yaml#/trustedDomain"
  /settings/canned-responses:
    $ref: "./paths/settings.yaml#/cannedResponses"
  /settings/canned-responses/{cannedResponseId}:
    $ref: "./paths/settings.yaml#/cannedResponse"
  /settings/routing-rules:
    $ref: "./paths/settings.yaml#/routingRules"
  /settings/routing-rules/{ruleId}:
    $ref: "./paths/settings.yaml#/routingRule"

  /reports/overview:
    $ref: "./paths/reports.yaml#/overview"
  /billing/subscription:
    $ref: "./paths/reports.yaml#/subscription"
  /billing/usage:
    $ref: "./paths/reports.yaml#/usage"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.1 access token or customer token.
    basicPat:
      type: http
      scheme: basic
      description: "Personal Access Token — `base64(account_id:pat)`."

  schemas:
    Health:
      type: object
      required: [status, service, version, region, uptime_s, dependencies]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
          examples: [api]
        version:
          type: string
        region:
          type: string
          enum: [eu]
        uptime_s:
          type: number
        dependencies:
          type: object
          required: [database, redis]
          properties:
            database: { $ref: "#/components/schemas/DependencyHealth" }
            redis: { $ref: "#/components/schemas/DependencyHealth" }

    DependencyHealth:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [up, down]
        latency_ms:
          type: number
        error:
          type: string

    TokenGrant:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, scope, account_id, license_id]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in:
          type: integer
          description: Seconds. Capped at 3600 — the source platform used 28800.
        refresh_token:
          type: string
          description: Rotates on every use; the previous value stops working.
        scope: { type: string, description: Comma-separated. }
        account_id: { type: string, format: uuid }
        license_id: { type: string }
        organization_id: { type: string, format: uuid }

    Chat:
      type: object
      required: [id, license_id, customer_id, active, created_at, access, users]
      properties:
        id: { type: string, description: "Short base32 token, e.g. TJ1H8CFKRV." }
        license_id: { type: string }
        customer_id: { type: string, format: uuid }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        access:
          type: object
          properties:
            group_ids:
              type: array
              items: { type: integer, format: int64 }
        users:
          type: array
          items: { $ref: "#/components/schemas/ChatUser" }
        thread: { $ref: "#/components/schemas/Thread" }

    ChatSummary:
      type: object
      required: [id, customer_id, active, created_at]
      properties:
        id: { type: string }
        customer_id: { type: string, format: uuid }
        customer_name: { type: string, nullable: true }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        thread_id: { type: string, nullable: true }
        assignee_id: { type: string, format: uuid, nullable: true }
        queue_position: { type: integer, nullable: true }
        unread_count: { type: integer }
        last_event:
          allOf:
            - $ref: "#/components/schemas/Event"
          nullable: true
        tags:
          type: array
          items: { type: string }

    ChatUser:
      type: object
      required: [user_id, user_type, present]
      properties:
        user_id: { type: string }
        user_type: { type: string, enum: [agent, customer] }
        present: { type: boolean }
        seen_up_to: { type: string, format: date-time, nullable: true }
        name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }

    Thread:
      type: object
      required: [id, chat_id, active, created_at]
      properties:
        id: { type: string }
        chat_id: { type: string }
        active: { type: boolean }
        assignee_id: { type: string, format: uuid, nullable: true }
        queue_position: { type: integer, nullable: true }
        summary: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        tags:
          type: array
          items: { type: string }

    Event:
      type: object
      required: [id, chat_id, thread_id, type, author_type, recipients, created_at]
      properties:
        id:
          type: string
          description: "`<thread_id>_<sequence>` — ordering is decidable from the id alone."
        chat_id: { type: string }
        thread_id: { type: string }
        type:
          type: string
          enum: [message, system_message, rich_message, file, filled_form]
        text: { type: string, nullable: true }
        author_id: { type: string, nullable: true }
        author_type: { type: string, enum: [agent, customer, bot, system] }
        recipients:
          type: string
          enum: [all, agents]
          description: "`agents` is an internal note and never reaches the customer."
        attachment_url: { type: string, nullable: true }
        properties:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    NewEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [message, system_message, rich_message, file, filled_form]
          default: message
        text: { type: string, maxLength: 10000 }
        recipients:
          type: string
          enum: [all, agents]
          default: all
        attachment_url: { type: string, format: uri }
        properties:
          type: object
          additionalProperties: true
        idempotency_key:
          type: string
          maxLength: 128
          description: Retrying with the same key returns the original event.

    PersonalAccessToken:
      type: object
      required: [id, name, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        kind: { type: string, enum: [pat, oauth, bot] }
        scopes:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }

    AiAgent:
      type: object
      required: [id, name, kind, active]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string, enum: [ai_agent, copilot] }
        tone: { type: string, nullable: true }
        active: { type: boolean }
        skills_count: { type: integer }

    SkillStep:
      type: object
      required: [type]
      description: |
        A discriminated union on `type`. Steps are validated before they are
        stored, so a step the engine cannot run is refused at save time rather
        than skipped silently when a customer is waiting.
      properties:
        type:
          type: string
          enum: [detect_intent, request_info, tag, summarize, send_message, transfer_to_team]
        intent: { type: string, description: "detect_intent: the intent name." }
        phrases:
          type: array
          items: { type: string }
          description: "detect_intent: phrases to look for."
        field: { type: string, description: "request_info: what to collect." }
        prompt: { type: string, description: "request_info: what to ask." }
        tag: { type: string, description: "tag: the tag to apply." }
        source:
          type: string
          enum: [text, knowledge]
          description: "send_message: a fixed reply, or one retrieved from knowledge."
        text: { type: string, description: "send_message with source=text." }
        group: { type: string, description: "transfer_to_team: the team name." }

    Skill:
      type: object
      required: [id, name, kind, steps, active, runs_count]
      properties:
        id: { type: string, format: uuid }
        ai_agent_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        kind: { type: string, enum: [ai_agent, workspace] }
        instruction: { type: string, nullable: true }
        steps:
          type: array
          items: { $ref: "#/components/schemas/SkillStep" }
        active: { type: boolean }
        runs_count: { type: integer }
        updated_at: { type: string, format: date-time }

    SkillPreview:
      type: object
      required: [outcome, log, errors]
      properties:
        outcome:
          type: string
          enum: [answered, handed_off, skipped]
          description: |
            `skipped` means the intent did not match, or nothing produced a
            reply — in which case a human takes the conversation.
        reply: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        transfer_to: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        log:
          type: array
          items: { $ref: "#/components/schemas/SkillLogEntry" }
        errors:
          type: array
          description: Reasons the step list could not be run at all.
          items: { type: string }

    SkillLogEntry:
      type: object
      required: [step, detail, ok]
      properties:
        step: { type: string }
        detail: { type: string }
        ok: { type: boolean }

    SkillRun:
      type: object
      required: [id, status, ran_at, log]
      properties:
        id: { type: string, format: uuid }
        chat_id: { type: string, nullable: true }
        status:
          type: string
          enum: [succeeded, failed, aborted]
          description: Whether the run completed — not what it did to the chat.
        outcome:
          type: string
          nullable: true
          enum: [answered, handed_off, skipped, null]
        ran_at: { type: string, format: date-time }
        log:
          type: array
          items: { $ref: "#/components/schemas/SkillLogEntry" }

    KnowledgeSource:
      type: object
      required: [id, name, type, status, chunk_count]
      properties:
        id: { type: string, format: uuid }
        ai_agent_id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [website, file, article, faq] }
        status: { type: string }
        chunk_count: { type: integer }
        updated_at: { type: string, format: date-time }

    TrustedDomain:
      type: object
      required: [id, domain, include_subdomains, created_at]
      properties:
        id: { type: string, format: uuid }
        domain:
          type: string
          description: Hostname only — lowercased, no scheme, port or path.
        include_subdomains: { type: boolean }
        created_at: { type: string, format: date-time }

    CannedResponse:
      type: object
      required: [id, shortcut, text, scope, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        shortcut: { type: string }
        text: { type: string }
        scope: { type: string, enum: [chat, ticket] }
        group_id: { type: integer, format: int64, nullable: true }
        updated_by: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RoutingRule:
      type: object
      required: [id, kind, conditions, priority, is_fallback, enabled]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        kind: { type: string, enum: [chat, ticket] }
        conditions:
          type: object
          description: |
            All must match for the rule to win. Empty on the fallback rule,
            which is why it catches everything.
          additionalProperties: true
        target_group_id: { type: integer, format: int64, nullable: true }
        target_group_name: { type: string, nullable: true }
        priority: { type: integer }
        is_fallback: { type: boolean }
        enabled: { type: boolean }

    CustomerSummary:
      type: object
      required: [id, name, email, is_lead, banned, chats_count, tickets_count]
      properties:
        id: { type: string, format: uuid }
        name:
          type: string
          nullable: true
          description: Null for a visitor who never introduced themselves.
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        country_code: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        country: { type: string, nullable: true }
        is_lead:
          type: boolean
          description: Left an email address.
        banned: { type: boolean }
        chats_count:
          type: integer
          description: Counted from conversations, not read from a stored total.
        tickets_count: { type: integer }
        last_activity_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Session:
      type: object
      description: |
        The account and the workspaces it may sign in to. Deliberately carries
        no tokens: the caller picks a workspace and continues through
        `/auth/authorize`, so one code path issues credentials rather than
        three.
      required: [account, memberships]
      properties:
        account:
          type: object
          required: [id, email, name]
          properties:
            id: { type: string, format: uuid }
            email: { type: string }
            name: { type: string }
        memberships:
          type: array
          items:
            type: object
            required: [license_id, organization_id, organization_name, role]
            properties:
              license_id: { type: string }
              organization_id: { type: string, format: uuid }
              organization_name: { type: string }
              role: { type: string, enum: [owner, viceowner, admin, agent] }
              license_status: { type: string }
              client_id:
                type: string
                nullable: true
                description: |
                  The workspace's OAuth client. Returned so the agent app does
                  not have to derive one from the organisation name — which had
                  no answer for a workspace created through signup, and
                  collided for two organisations sharing a first word.

    Invitation:
      type: object
      required: [id, email, role, expires_at, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [admin, agent] }
        invited_by_name: { type: string, nullable: true }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        accept_url:
          type: string
          nullable: true
          description: |
            The shareable link, returned **only** in the response that creates
            the invitation. Listing invitations later does not re-expose it: the
            token is stored as a hash, so there is nothing to re-expose, and a
            list endpoint that handed out working links would turn read access
            to the team page into workspace access.

    Ticket:
      type: object
      required: [id, subject, status, created_at]
      properties:
        id: { type: string, maxLength: 12 }
        subject: { type: string }
        status:
          type: string
          enum: [open, pending, solved, closed, spam]
        assignee_id: { type: string, format: uuid, nullable: true }
        assignee_name: { type: string, nullable: true }
        group_id: { type: integer, format: int64, nullable: true }
        customer_id: { type: string, format: uuid, nullable: true }
        customer_name:
          type: string
          nullable: true
          description: Null for a visitor who never introduced themselves.
        customer_email: { type: string, nullable: true }
        source_chat_id:
          type: string
          nullable: true
          maxLength: 12
          description: The conversation this followed on from, if any.
        last_message_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    TicketDetail:
      allOf:
        - $ref: "#/components/schemas/Ticket"
        - type: object
          properties:
            source_chat:
              nullable: true
              description: |
                A snapshot of the conversation the ticket came from, so an agent
                picking the ticket up has the context without hunting for it.
              type: object
              required: [id, active]
              properties:
                id: { type: string, maxLength: 12 }
                active: { type: boolean }
                created_at: { type: string, format: date-time }

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/CustomerSummary"
        - type: object
          required: [visits, chats]
          properties:
            banned_at: { type: string, format: date-time, nullable: true }
            visits:
              type: array
              description: Most recent first.
              items: { $ref: "#/components/schemas/Visit" }
            chats:
              type: array
              items:
                type: object
                required: [id, active, created_at]
                properties:
                  id: { type: string }
                  active: { type: boolean }
                  created_at: { type: string, format: date-time }
                  last_event_at: { type: string, format: date-time, nullable: true }

    Visit:
      type: object
      required: [id, started_at, pages]
      properties:
        id: { type: string, format: uuid }
        came_from:
          type: string
          nullable: true
          description: Referring URL, when the browser sent one.
        pages:
          type: array
          description: Pages seen during the visit, in order.
          items:
            type: object
            properties:
              url: { type: string }
              at: { type: string, format: date-time }
        os: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }

    Agent:
      type: object
      required: [id, name, email, role, routing_status, concurrent_chats_limit]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        avatar_url: { type: string, nullable: true }
        role: { type: string, enum: [owner, viceowner, admin, agent] }
        routing_status:
          type: string
          enum: [accepting_chats, not_accepting_chats, offline]
        concurrent_chats_limit:
          type: integer
          description: Routing never assigns past this. Over-limit means queued.
        two_factor_enabled: { type: boolean }

    Group:
      type: object
      required: [id, name, language_code, agents]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        language_code: { type: string }
        agents:
          type: array
          items:
            type: object
            required: [agent_id, priority]
            properties:
              agent_id: { type: string, format: uuid }
              priority:
                type: string
                enum: [primary, first, normal, last]
                description: |
                  Assignment preference within the team (ADR-08). A full tier is
                  skipped rather than queued behind.

    UsageSummary:
      type: object
      required: [period, ai_resolutions, api_calls]
      properties:
        period: { type: string, description: "`yyyymm`." }
        ai_resolutions:
          type: object
          required: [used, included, overage, overage_cents]
          properties:
            used:
              type: integer
              description: |
                Threads that closed with no agent-authored event (ADR-09). The
                same query backs the "automated" figure in reports.
            included: { type: integer }
            overage: { type: integer }
            overage_cents: { type: integer }
        api_calls:
          type: object
          required: [used, included]
          properties:
            used: { type: integer }
            included: { type: integer }

    ReportsOverview:
      type: object
      required: [range, totals, response_times, satisfaction, by_agent, top_tags]
      properties:
        range:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        totals:
          type: object
          required: [chats, tickets, total_cases, closed, automated, queued_now]
          properties:
            chats: { type: integer }
            tickets:
              type: integer
              description: Tickets created in the range.
            total_cases:
              type: integer
              description: |
                Chats plus tickets (PRD §3.3). Sent rather than left for the
                client to add up, so every surface quoting "total cases" quotes
                the same number.
            closed: { type: integer }
            automated: { type: integer }
            automated_rate:
              type: number
              nullable: true
              description: Share of *closed* chats. Null when nothing closed.
            queued_now: { type: integer }
        response_times:
          type: object
          properties:
            avg_first_response_seconds: { type: integer, nullable: true }
            avg_duration_seconds: { type: integer, nullable: true }
        satisfaction:
          type: object
          required: [good, bad, responses]
          properties:
            good: { type: integer }
            bad: { type: integer }
            score:
              type: number
              nullable: true
              description: Null when nobody rated — unknown, not zero.
            responses: { type: integer }
        by_agent:
          type: array
          items:
            type: object
            required: [agent_id, chats]
            properties:
              agent_id: { type: string, format: uuid }
              name: { type: string, nullable: true }
              chats: { type: integer }
        top_tags:
          type: array
          items:
            type: object
            required: [name, count]
            properties:
              name: { type: string }
              count: { type: integer }

    CustomerChatState:
      type: object
      required: [online, customer, chat, events]
      properties:
        online:
          type: boolean
          description: Whether any agent is currently accepting chats.
        customer:
          type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }
            name: { type: string, nullable: true }
            email: { type: string, nullable: true }
        chat:
          type: object
          nullable: true
          required: [id]
          properties:
            id: { type: string }
            thread_id: { type: string, nullable: true }
            queue_position: { type: integer, nullable: true }
        events:
          type: array
          description: Customer-visible events only. Internal notes never appear.
          items: { $ref: "#/components/schemas/Event" }

    CustomerMessageResult:
      type: object
      required: [chat_id]
      properties:
        chat_id: { type: string }
        queue_position: { type: integer, nullable: true }
        event:
          oneOf:
            - $ref: "#/components/schemas/Event"
            - type: "null"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [type, message, request_id]
          properties:
            type:
              $ref: "#/components/schemas/ErrorType"
            message:
              type: string
              description: Human-readable; never contains secrets or raw SQL.
            request_id:
              type: string
              description: Correlates with server logs and traces.
            details:
              type: object
              additionalProperties: true

    ErrorType:
      type: string
      description: Machine-readable error category (v2-03 §1.8).
      enum:
        - authentication
        - authorization
        - chat_anonymized
        - chat_inactive
        - customer_banned
        - greeting_not_found
        - group_not_found
        - group_offline
        - group_unavailable
        - groups_offline
        - internal
        - license_expired
        - limit_reached
        - misdirected_request
        - not_allowed
        - not_found
        - pending_requests_limit_reached
        - request_timeout
        - service_unavailable
        - too_many_requests
        - unsupported_version
        - users_limit_reached
        - validation
        - wrong_product_version

  responses:
    BadRequest:
      description: Malformed or failing validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing, malformed or expired credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but lacking the required scope or role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: |
        Resource does not exist, or exists in another tenant. Both cases return
        404 so IDs cannot be enumerated (NFR-S5).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Conflicts with current resource state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    PaymentRequired:
      description: |
        The trial has expired and the workspace is read-only (ADR-10). Reads
        still succeed and nothing has been deleted; writes resume on subscribing.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the caller may retry.
          schema: { type: integer }
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          description: Unix timestamp (seconds) when the window resets.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  parameters:
    PageId:
      name: page_id
      in: query
      required: false
      description: Opaque keyset cursor from the previous page.
      schema: { type: string }
    ChatId:
      name: chatId
      in: path
      required: true
      description: Short base32 chat token.
      schema: { type: string, minLength: 10, maxLength: 12 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }

security:
  - bearerAuth: []
  - basicPat: []
